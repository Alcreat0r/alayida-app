<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALAYIDA</title>

<style>
:root{
  --bg:#f2f2f5;
  --card:#ffffff;
  --accent:#e91e63;
  --text:#222;
}

/* DARK MODE */
.dark{
  --bg:#1c1c1e;
  --card:#2c2c2e;
  --accent:#ff2d55;
  --text:#ffffff;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 25px;
}

.logo{
  font-weight:600;
  font-size:20px;
  letter-spacing:2px;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* MAIN */
.main{
  text-align:center;
  margin-top:80px;
}

.main h1{
  font-weight:500;
}

input{
  width:80%;
  max-width:400px;
  padding:14px;
  margin-top:20px;
  border-radius:12px;
  border:1px solid #ddd;
  background:var(--card);
  color:var(--text);
}

button.action{
  margin-top:15px;
  padding:12px 30px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button.action:hover{
  opacity:0.8;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  right:-320px;
  width:280px;
  height:100%;
  background:var(--card);
  padding:25px;
  transition:0.4s;
  box-shadow:-5px 0 25px rgba(0,0,0,0.1);
  overflow-y:auto;
}

.sidebar.active{
  right:0;
}

.sidebar h3{
  margin-top:25px;
  font-weight:500;
}

.sidebar select,
.sidebar textarea,
.sidebar button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  background:var(--bg);
  color:var(--text);
}

.sidebar button{
  background:var(--accent);
  color:white;
  border:none;
  cursor:pointer;
}

.footer{
  text-align:center;
  margin:100px 0 20px;
  font-size:13px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">ALAYIDA</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="main">
  <h1>Интеллект нового поколения</h1>
  <input type="text" placeholder="Введите запрос...">
  <br>
  <button class="action">Запустить AI</button>
</div>

<div class="sidebar" id="sidebar">

  <h3>🌙 Режим</h3>
  <button onclick="toggleMode()">Переключить тему</button>

  <h3>🌍 Язык</h3>
  <select>
    <option>Русский</option>
    <option>O‘zbekcha</option>
    <option>English</option>
  </select>

  <h3>💎 Премиум</h3>
  <select>
    <option>1 месяц — 99 000 сум</option>
    <option>2 месяца — 129 000 сум</option>
    <option>1 год — 299 000 сум</option>
  </select>
  <button>Оформить</button>

  <h3>📝 Отзыв</h3>
  <textarea rows="4" placeholder="Оставьте отзыв..."></textarea>
  <button>Отправить</button>

</div>

<div class="footer">
  © 2025 ALAYIDA — Premium AI Platform
</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function toggleMode(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
