<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alayida AI</title>

<style>
body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
    margin:0;
    font-size:22px;
}

p{
    opacity:0.7;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.primary{
    background:#3b82f6;
    color:white;
}

.primary:hover{
    background:#2563eb;
}

.premium-btn{
    background:#f59e0b;
    color:black;
}

.premium-btn:hover{
    background:#d97706;
}

.result{
    margin-top:20px;
    display:none;
}

.spinner{
    border:4px solid rgba(255,255,255,0.2);
    border-top:4px solid #3b82f6;
    border-radius:50%;
    width:35px;
    height:35px;
    margin:15px auto;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
    <h1>Alayida AI</h1>
    <p>Professional AI Image Transformer</p>

    <input type="text" id="prompt" placeholder="Masalan: cartoon style">

    <button class="primary" onclick="generate()">
        Generate
    </button>

    <div class="spinner" id="loading"></div>

    <div class="result" id="resultBox">
        <p>✨ AI natija tayyor</p>
    </div>

    <button class="premium-btn" onclick="buyPremium()">
        Premium olish (1 oy)
    </button>

    <p style="margin-top:10px;font-size:12px;opacity:0.6;">
        1 marta bepul foydalanish mumkin
    </p>
</div>

<script>
let used = localStorage.getItem("used");
let premium = localStorage.getItem("premium");

function generate(){
    const prompt = document.getElementById("prompt").value;
    const loading = document.getElementById("loading");
    const result = document.getElementById("resultBox");

    if(!prompt){
        alert("Iltimos prompt yozing");
        return;
    }

    if(premium === "active"){
        processAI();
        return;
    }

    if(!used){
        localStorage.setItem("used","true");
        processAI();
    } else {
        alert("Bepul limit tugadi. Premium oling 💳");
    }
}

function processAI(){
    const loading = document.getElementById("loading");
    const result = document.getElementById("resultBox");

    loading.style.display="block";
    result.style.display="none";

    setTimeout(()=>{
        loading.style.display="none";
        result.style.display="block";
    },2000);
}

function buyPremium(){
    alert("Demo: To‘lov muvaffaqiyatli 💳");
    localStorage.setItem("premium","active");
}
</script>

</body>
</html>
