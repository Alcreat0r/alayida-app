<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alayida AI</title>

<style>
:root{
  --bg1:#0f2027;
  --bg2:#203a43;
  --bg3:#2c5364;
  --card:rgba(255,255,255,0.08);
  --text:white;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:var(--text);
  transition:0.3s;
}

/* LIGHT MODE */
.light{
  --bg1:#f5f7fa;
  --bg2:#e4e8f0;
  --bg3:#d6dbe6;
  --card:white;
  --text:black;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.2);
}

.navbar button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  font-size:14px;
}

.container{
  max-width:500px;
  margin:40px auto;
  padding:30px;
  background:var(--card);
  border-radius:25px;
  backdrop-filter:blur(15px);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  text-align:center;
}

input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button.action{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button.action:hover{
  transform:scale(1.05);
}

.pricing-card{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.3s;
}

.pricing-card:hover{
  background:gold;
  color:black;
}

.footer{
  text-align:center;
  margin:40px 0 20px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="navbar">
  <div><b>Alayida AI</b></div>
  <div>
    <button onclick="toggleMode()">🌙/☀️</button>
    <button onclick="changeLang()">Til</button>
  </div>
</div>

<div class="container">
  <h2>Luxury AI Xizmat</h2>

  <input type="text" placeholder="Prompt yozing...">

  <button class="action">AI Ishga tushirish</button>

  <h3>💎 Premium Tariflar</h3>

  <div class="pricing-card" onclick="selectPlan('1 oy - 99 000 so‘m')">
    1 Oy — 99 000 so‘m
  </div>

  <div class="pricing-card" onclick="selectPlan('2 oy - 129 000 so‘m')">
    2 Oy — 129 000 so‘m
  </div>

  <div class="pricing-card" onclick="selectPlan('1 yil - 299 000 so‘m')">
    1 Yil — 299 000 so‘m
  </div>

  <h3>📝 Izoh qoldirish</h3>
  <textarea rows="4" placeholder="Fikringizni yozing..."></textarea>
  <button class="action">Izoh yuborish</button>

</div>

<div class="footer">
  © 2025 Alayida AI — Luxury Digital Service
</div>

<script>
function toggleMode(){
  document.body.classList.toggle("light");
}

function changeLang(){
  alert("Til o‘zgartirish funksiyasi keyingi versiyada backend bilan ishlaydi.");
}

function selectPlan(plan){
  alert("Siz tanladingiz: " + plan);
}
</script>

</body>
</html>
