<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-ayidaCreator🎀</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0b0f;
  color:white;
  overflow:hidden;
}

/* HEADER */
.header{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
  font-size:18px;
  background:linear-gradient(90deg,#ff00cc,#7b2ff7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.menu{
  font-size:26px;
  cursor:pointer;
}

/* CHAT */
.chat{
  height:72vh;
  overflow:auto;
  padding:15px;
}

.message{
  padding:14px 18px;
  border-radius:20px;
  margin-bottom:12px;
  max-width:75%;
  animation:fadeIn 0.3s ease;
}

.user{
  background:linear-gradient(135deg,#ff00cc,#7b2ff7);
  margin-left:auto;
}

.bot{
  background:#1a1a22;
  border:1px solid #7b2ff7;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* INPUT */
.input-area{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:12px;
  background:#111118;
  border-top:1px solid #2a2a35;
}

.input-area input[type="text"]{
  flex:1;
  padding:12px;
  border-radius:30px;
  border:none;
  outline:none;
  background:#1a1a22;
  color:white;
}

.input-area button{
  margin-left:8px;
  border:none;
  border-radius:50%;
  width:48px;
  height:48px;
  font-size:18px;
  cursor:pointer;
  background:linear-gradient(135deg,#ff00cc,#7b2ff7);
  color:white;
  box-shadow:0 0 15px #ff00cc80;
}

#fileInput{
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <div>Al-ayidaCreator🎀</div>
  <div class="menu">☰</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <button onclick="document.getElementById('fileInput').click()">+</button>
  <input type="file" id="fileInput" accept="image/*">
  <input type="text" id="messageInput" placeholder="Напишите сообщение...">
  <button onclick="sendMessage()">➤</button>
</div>

<script>
async function sendMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  try{
    const response = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer YOUR_OPENAI_API_KEY"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[{role:"user",content:text}]
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;

    addMessage(reply,"bot");
  }catch(err){
    addMessage("Ошибка подключения к AI","bot");
  }
}

function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
