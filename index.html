<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALAYIDA</title>

<style>
:root{
  --bg:linear-gradient(135deg,#f6f7fb,#e8ecf5);
  --card:#ffffff;
  --accent:#6c5ce7;
  --text:#222;
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#22d3ee;
  --text:#ffffff;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* CHAT AREA */
.chat{
  height:70vh;
  padding:20px;
}

/* INPUT AREA */
.input-area{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:var(--card);
  padding:10px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

.input-area input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  background:#f0f0f0;
}

.input-area button{
  margin-left:10px;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  background:var(--accent);
  color:white;
  font-size:20px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  right:-50%;
  width:50%;
  height:100%;
  background:var(--card);
  box-shadow:-10px 0 40px rgba(0,0,0,0.2);
  transition:0.4s;
  padding:20px;
  overflow-y:auto;
  z-index:1000;
}

.sidebar.active{
  right:0;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

h3{
  margin-top:25px;
}

.option{
  margin-top:10px;
  padding:10px;
  background:#f1f1f1;
  border-radius:10px;
  cursor:pointer;
}

.dark .option{
  background:#334155;
}

.premium-card{
  padding:10px;
  margin-top:10px;
  border-radius:12px;
  background:linear-gradient(135deg,#a18cd1,#fbc2eb);
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div><b>ALAYIDA</b></div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="chat">
  <p>AI javoblari shu yerda chiqadi...</p>
</div>

<div class="input-area">
  <button>+</button>
  <input type="text" placeholder="Введите сообщение...">
  <button>➤</button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">

  <h3>🌙 Режим</h3>
  <div class="option" onclick="toggleMode()">On / Off</div>

  <h3>🌍 Язык</h3>
  <div class="option" onclick="changeLang('ru')">Русский</div>
  <div class="option" onclick="changeLang('uz')">O‘zbekcha</div>
  <div class="option" onclick="changeLang('en')">English</div>

  <h3>💎 Премиум</h3>
  <div class="premium-card" onclick="goPay()">1 месяц — 99 000</div>
  <div class="premium-card" onclick="goPay()">2 месяца — 129 000</div>
  <div class="premium-card" onclick="goPay()">1 год — 299 000</div>

  <h3>📝 Отзыв</h3>
  <textarea rows="4" style="width:100%;border-radius:10px;"></textarea>
  <div class="option">Отправить</div>

</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function toggleMode(){
  document.body.classList.toggle("dark");
}

function changeLang(lang){
  alert("Выбран язык: " + lang);
  toggleMenu();
}

function goPay(){
  window.location.href="https://payme.uz"; // yoki click.uz
}
</script>

</body>
</html>
