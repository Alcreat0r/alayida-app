<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-ayidaCreator🎀</title>

<style>
:root{
  --bg:linear-gradient(135deg,#fdfbfb,#ebedee);
  --card:#ffffff;
  --accent:#ec4899;
  --text:#1e1e1e;
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#22d3ee;
  --text:#ffffff;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  font-weight:bold;
  font-size:18px;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* CHAT */
.chat{
  height:60vh;
  padding:20px;
  overflow:auto;
}

/* INPUT */
.input-area{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:var(--card);
  box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

.input-area input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  background:#f1f1f1;
}

.input-area button{
  margin-left:8px;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  background:var(--accent);
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  right:-50%;
  width:50%;
  height:100%;
  background:var(--card);
  box-shadow:-10px 0 40px rgba(0,0,0,0.2);
  padding:20px;
  transition:0.3s;
  overflow:auto;
  z-index:1000;
}

.sidebar.active{
  right:0;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

.section{
  margin-top:25px;
}

.option{
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  background:#f1f1f1;
  cursor:pointer;
}

.dark .option{
  background:#334155;
}

.premium-card{
  padding:8px;
  margin-top:8px;
  border-radius:12px;
  background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
  color:black;
  font-size:14px;
  cursor:pointer;
}

textarea{
  width:100%;
  border-radius:10px;
  padding:8px;
  margin-top:8px;
}
.review-item{
  padding:8px;
  margin-top:6px;
  background:#ddd;
  border-radius:8px;
}
.dark .review-item{
  background:#475569;
}
</style>
</head>

<body>

<div class="header">
  <div>Al-ayidaCreator🎀</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="chat" id="chatText">
  AI готов к работе...
</div>

<div class="input-area">
  <button>+</button>
  <input type="text" id="input" placeholder="Введите сообщение...">
  <button>➤</button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">

  <div class="section">
    <b id="modeText">Режим</b>
    <div class="option" onclick="toggleMode()">On / Off</div>
  </div>

  <div class="section">
    <b>Язык</b>
    <div class="option" onclick="setLang('ru')">Русский</div>
    <div class="option" onclick="setLang('uz')">O‘zbekcha</div>
    <div class="option" onclick="setLang('en')">English</div>
  </div>

  <div class="section">
    <b id="premiumText">Премиум</b>
    <div class="premium-card" onclick="goPay()">1 месяц — 99 000</div>
    <div class="premium-card" onclick="goPay()">2 месяца — 129 000</div>
    <div class="premium-card" onclick="goPay()">1 год — 299 000</div>
  </div>

  <div class="section">
    <b id="reviewText">Отзыв</b>
    <textarea id="reviewInput" rows="3"></textarea>
    <div class="option" onclick="addReview()">Отправить</div>
    <div id="reviewList"></div>
  </div>

</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function toggleMode(){
  document.body.classList.toggle("dark");
}

function goPay(){
  window.location.href="https://payme.uz";
}

/* LANGUAGE SYSTEM */
function setLang(lang){
  const texts={
    ru:{
      chat:"AI готов к работе...",
      input:"Введите сообщение...",
      mode:"Режим",
      premium:"Премиум",
      review:"Отзыв"
    },
    uz:{
      chat:"AI ishlashga tayyor...",
      input:"Xabar yozing...",
      mode:"Rejim",
      premium:"Premium",
      review:"Izoh"
    },
    en:{
      chat:"AI is ready...",
      input:"Type a message...",
      mode:"Mode",
      premium:"Premium",
      review:"Review"
    }
  };

  document.getElementById("chatText").innerText=texts[lang].chat;
  document.getElementById("input").placeholder=texts[lang].input;
  document.getElementById("modeText").innerText=texts[lang].mode;
  document.getElementById("premiumText").innerText=texts[lang].premium;
  document.getElementById("reviewText").innerText=texts[lang].review;

  toggleMenu();
}

/* REVIEW SYSTEM */
function loadReviews(){
  let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
  let container = document.getElementById("reviewList");
  container.innerHTML="";
  reviews.forEach(r=>{
    let div=document.createElement("div");
    div.className="review-item";
    div.innerText=r;
    container.appendChild(div);
  });
}

function addReview(){
  let text=document.getElementById("reviewInput").value;
  if(text.trim()=="") return;

  let reviews=JSON.parse(localStorage.getItem("reviews")) || [];
  reviews.push(text);
  localStorage.setItem("reviews",JSON.stringify(reviews));

  document.getElementById("reviewInput").value="";
  loadReviews();
}

window.onload=loadReviews;
</script>

</body>
</html>
